{{ define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="page-header__desc">{{ . }}</p>{{ end }}
</header>

{{ if .Pages }}
<ul class="post-list">
  {{ range .Pages }}
  <li class="post-list__item">
    <time class="post-list__date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
    <div>
      <div class="post-list__title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></div>
      {{ with .Summary }}<p class="post-list__excerpt">{{ . }}</p>{{ end }}
    </div>
  </li>
  {{ end }}
</ul>
{{ else }}
<p class="empty-state">// no posts yet</p>
{{ end }}
{{ end }}
